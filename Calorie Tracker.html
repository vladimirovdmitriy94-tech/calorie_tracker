<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🥗 Calorie Tracker — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: oklch(0.13 0.02 250);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 40px 20px;
    gap: 40px;
    flex-wrap: wrap;
  }
  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px; right: 24px;
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    z-index: 9999;
    width: 260px;
    font-family: 'DM Sans', sans-serif;
  }
  #tweaks-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #111; }
  #tweaks-panel label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; margin-top: 10px; }
  #tweaks-panel select, #tweaks-panel input[type=color] {
    width: 100%; padding: 6px 8px; border-radius: 8px;
    border: 1px solid #e0e0e0; font-size: 13px; font-family: inherit;
  }
  #tweaks-panel input[type=color] { height: 36px; padding: 2px; cursor: pointer; }
  .tweak-row { display: flex; gap: 8px; }
  .tweak-row select { flex: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes progressFill {
    from { width: 0; }
    to { width: var(--target-w); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#e65bac",
  "screenMode": "all",
  "chatScenario": "summary"
}/*EDITMODE-END*/;

// ─── Color system ──────────────────────────────────────────────────────────────
const G = {
  bg: 'oklch(0.975 0.006 80)',
  bgDeep: 'oklch(0.95 0.008 80)',
  surface: '#ffffff',
  border: 'oklch(0.91 0.005 80)',
  text: 'oklch(0.18 0.01 250)',
  textMid: 'oklch(0.44 0.01 250)',
  textLight: 'oklch(0.62 0.008 250)',
  accent: '#3d8b5e',
  accentLight: 'oklch(0.94 0.04 152)',
  accentText: '#2a6342',
  userBubble: '#3d8b5e',
  aiBubble: '#ffffff',
  red: 'oklch(0.56 0.17 25)',
  amber: 'oklch(0.66 0.14 72)',
  green: 'oklch(0.52 0.14 152)',
};

// ─── Icons (inline SVG) ────────────────────────────────────────────────────────
const Icon = {
  leaf: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>,
  settings: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  camera: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
  chart: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
  list: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  send: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  google: <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>,
  trash: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
  back: <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8 2L2 8l6 6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  check: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
};

// ─── Typing indicator ──────────────────────────────────────────────────────────
function TypingIndicator() {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 3, padding: '10px 12px', background: G.aiBubble, borderRadius: '16px 16px 16px 4px', boxShadow: '0 1px 4px rgba(0,0,0,0.07)', width: 56 }}>
      {[0,1,2].map(i => (
        <div key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: G.textLight, animation: `typingDot 1.2s ${i*0.2}s ease-in-out infinite` }}/>
      ))}
    </div>
  );
}

// ─── Macro bar ────────────────────────────────────────────────────────────────
function MacroBar({ label, consumed, target, color, unit = 'g' }) {
  const pct = Math.min((consumed / target) * 100, 100);
  const status = consumed > target * 1.1 ? 'over' : consumed < target * 0.9 ? 'low' : 'ok';
  const badge = status === 'over' ? { text: 'Over', bg: 'oklch(0.96 0.04 25)', color: G.red }
              : status === 'low' ? { text: 'Low', bg: 'oklch(0.97 0.03 72)', color: G.amber }
              : { text: '✓', bg: G.accentLight, color: G.accentText };
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 5 }}>
        <span style={{ fontSize: 12, fontWeight: 500, color: G.text }}>{label}</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 11, color: G.textMid }}>{consumed}{unit} / {target}{unit}</span>
          <span style={{ fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 4, background: badge.bg, color: badge.color }}>{badge.text}</span>
        </div>
      </div>
      <div style={{ height: 6, borderRadius: 3, background: 'oklch(0.92 0.01 80)', overflow: 'hidden' }}>
        <div style={{ height: '100%', borderRadius: 3, background: color, width: `${pct}%`, transition: 'width 0.8s cubic-bezier(0.34,1.56,0.64,1)' }}/>
      </div>
    </div>
  );
}

// ─── Daily Summary Card ───────────────────────────────────────────────────────
function DailySummaryCard({ accent }) {
  const calories = { consumed: 1340, target: 2200 };
  const pct = (calories.consumed / calories.target) * 100;
  const remaining = calories.target - calories.consumed;
  const mealTypes = [
    { name: 'Breakfast', consumed: 430, target: 500, logged: true },
    { name: 'Lunch', consumed: 620, target: 650, logged: true },
    { name: 'Dinner', consumed: 290, target: 700, logged: true },
    { name: 'Snack', consumed: 0, target: 250, logged: false },
  ];
  return (
    <div style={{ background: G.surface, borderRadius: 16, padding: '14px 14px 10px', boxShadow: '0 2px 12px rgba(0,0,0,0.08)', animation: 'fadeUp 0.4s ease', border: `1px solid ${G.border}` }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: G.textMid, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Today's Summary</span>
        <span style={{ fontSize: 11, color: G.textLight }}>Sun, Apr 20</span>
      </div>
      {/* Calorie ring + big number */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 12 }}>
        <div style={{ position: 'relative', width: 64, height: 64, flexShrink: 0 }}>
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="oklch(0.92 0.01 80)" strokeWidth="6"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke={accent} strokeWidth="6"
              strokeDasharray={`${2*Math.PI*26 * pct/100} ${2*Math.PI*26 * (1 - pct/100)}`}
              strokeDashoffset={2*Math.PI*26 * 0.25}
              strokeLinecap="round"
              style={{ transition: 'stroke-dasharray 1s ease' }}/>
          </svg>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontSize: 15, fontWeight: 700, color: G.text, lineHeight: 1 }}>{Math.round(pct)}%</span>
          </div>
        </div>
        <div>
          <div style={{ fontSize: 26, fontWeight: 700, color: G.text, lineHeight: 1 }}>{calories.consumed.toLocaleString()}</div>
          <div style={{ fontSize: 12, color: G.textMid, marginTop: 2 }}>of {calories.target.toLocaleString()} kcal</div>
          <div style={{ fontSize: 12, color: G.green, fontWeight: 500, marginTop: 4 }}>{remaining} kcal remaining</div>
        </div>
      </div>
      {/* Macros */}
      <div style={{ borderTop: `1px solid ${G.border}`, paddingTop: 10, marginBottom: 10 }}>
        <MacroBar label="Protein" consumed={87} target={120} color="oklch(0.56 0.15 252)"/>
        <MacroBar label="Carbs" consumed={148} target={220} color="oklch(0.64 0.14 72)"/>
        <MacroBar label="Fat" consumed={42} target={65} color={G.green}/>
      </div>
      {/* Per-meal breakdown */}
      <div style={{ borderTop: `1px solid ${G.border}`, paddingTop: 10 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: G.textLight, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>By Meal</div>
        {mealTypes.map(m => {
          const mpct = Math.min((m.consumed / m.target) * 100, 100);
          const status = !m.logged ? 'none' : m.consumed > m.target * 1.1 ? '🔴' : m.consumed < m.target * 0.9 ? '⚠️' : '✅';
          return (
            <div key={m.name} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
              <span style={{ fontSize: 11, color: G.textMid, width: 56, flexShrink: 0 }}>{m.name}</span>
              <div style={{ flex: 1, height: 4, borderRadius: 2, background: 'oklch(0.92 0.01 80)', overflow: 'hidden' }}>
                {m.logged && <div style={{ height: '100%', borderRadius: 2, background: accent, width: `${mpct}%`, transition: 'width 0.8s ease' }}/>}
              </div>
              <span style={{ fontSize: 11, color: m.logged ? G.text : G.textLight, width: 54, textAlign: 'right', flexShrink: 0 }}>
                {m.logged ? `${m.consumed} kcal` : '—'}
              </span>
              <span style={{ fontSize: 11, width: 18, textAlign: 'center' }}>{status}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Meal List Card ───────────────────────────────────────────────────────────
function MealListCard() {
  const meals = {
    Breakfast: [{ name: 'Morning Oats', id: 12, kcal: 430 }],
    Lunch: [{ name: 'Chicken Rice Bowl', id: 13, kcal: 620 }],
    Dinner: [{ name: 'Salmon + Roasted Veg', id: 14, kcal: 290 }],
    Snack: [],
  };
  const mealColors = { Breakfast: '#f59e0b', Lunch: '#10b981', Dinner: '#6366f1', Snack: '#f97316' };
  const total = Object.values(meals).flat().reduce((s, m) => s + m.kcal, 0);
  return (
    <div style={{ background: G.surface, borderRadius: 16, padding: '14px', boxShadow: '0 2px 12px rgba(0,0,0,0.08)', animation: 'fadeUp 0.4s ease', border: `1px solid ${G.border}` }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: G.textMid, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Today's Log</span>
        <span style={{ fontSize: 13, fontWeight: 600, color: G.text }}>{total} kcal</span>
      </div>
      {Object.entries(meals).map(([type, items]) => (
        <div key={type} style={{ marginBottom: 10 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: mealColors[type], flexShrink: 0 }}/>
            <span style={{ fontSize: 11, fontWeight: 600, color: G.textMid, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{type}</span>
          </div>
          {items.length === 0 ? (
            <div style={{ fontSize: 12, color: G.textLight, paddingLeft: 14, fontStyle: 'italic' }}>Nothing logged</div>
          ) : items.map(item => (
            <div key={item.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingLeft: 14, paddingBottom: 2 }}>
              <span style={{ fontSize: 13, color: G.text }}>{item.name}</span>
              <span style={{ fontSize: 12, color: G.textMid, fontWeight: 500 }}>{item.kcal} kcal</span>
            </div>
          ))}
        </div>
      ))}
      <div style={{ borderTop: `1px solid ${G.border}`, paddingTop: 8, marginTop: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: G.textMid }}>Total logged today</span>
        <span style={{ fontSize: 14, fontWeight: 700, color: G.text }}>{total} / 2,200 kcal</span>
      </div>
    </div>
  );
}

// ─── Confirmation Card ────────────────────────────────────────────────────────
function ConfirmCard({ accent, onConfirm, onDeny }) {
  return (
    <div style={{ background: G.surface, borderRadius: 16, padding: 14, boxShadow: '0 2px 12px rgba(0,0,0,0.08)', animation: 'fadeUp 0.4s ease', border: `1px solid ${G.border}` }}>
      <div style={{ fontSize: 12, fontWeight: 600, color: G.textMid, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 10 }}>Confirm Log</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginBottom: 12 }}>
        {[['Chicken breast', '200g', '330 kcal'], ['White rice', '180g', '234 kcal'], ['Olive oil', '10ml', '88 kcal']].map(([n, q, c]) => (
          <div key={n} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: G.text }}>
            <span>{n} <span style={{ color: G.textLight }}>({q})</span></span>
            <span style={{ fontWeight: 500 }}>{c}</span>
          </div>
        ))}
        <div style={{ borderTop: `1px solid ${G.border}`, marginTop: 4, paddingTop: 6, display: 'flex', justifyContent: 'space-between', fontWeight: 600, fontSize: 13 }}>
          <span>Total</span><span>652 kcal · P 38g · C 29g · F 8g</span>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        <button onClick={onDeny} style={{ flex: 1, height: 38, borderRadius: 10, border: `1px solid ${G.border}`, background: 'transparent', fontSize: 13, fontWeight: 500, cursor: 'pointer', color: G.textMid, fontFamily: 'inherit' }}>Cancel</button>
        <button onClick={onConfirm} style={{ flex: 2, height: 38, borderRadius: 10, border: 'none', background: accent, color: 'white', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>Save to Log</button>
      </div>
    </div>
  );
}

// ─── Message bubble ───────────────────────────────────────────────────────────
function Message({ msg, accent, onConfirm, onDeny }) {
  const isUser = msg.role === 'user';
  return (
    <div style={{ display: 'flex', flexDirection: isUser ? 'row-reverse' : 'row', alignItems: 'flex-end', gap: 6, marginBottom: 8, animation: 'fadeUp 0.25s ease' }}>
      {!isUser && (
        <div style={{ width: 28, height: 28, borderRadius: '50%', background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginBottom: 2, fontSize: 14 }}>🥗</div>
      )}
      <div style={{ maxWidth: '82%' }}>
        {msg.type === 'text' && (
          <div style={{ padding: '9px 12px', borderRadius: isUser ? '16px 16px 4px 16px' : '16px 16px 16px 4px', background: isUser ? accent : G.aiBubble, color: isUser ? '#fff' : G.text, fontSize: 14, lineHeight: 1.5, boxShadow: isUser ? 'none' : '0 1px 4px rgba(0,0,0,0.07)', border: isUser ? 'none' : `1px solid ${G.border}` }}>
            {msg.content}
          </div>
        )}
        {msg.type === 'summary-card' && <DailySummaryCard accent={accent}/>}
        {msg.type === 'meal-list-card' && <MealListCard/>}
        {msg.type === 'confirm-card' && <ConfirmCard accent={accent} onConfirm={onConfirm} onDeny={onDeny}/>}
        {msg.time && <div style={{ fontSize: 10, color: G.textLight, marginTop: 3, textAlign: isUser ? 'right' : 'left', paddingLeft: isUser ? 0 : 4 }}>{msg.time}</div>}
      </div>
    </div>
  );
}

// ─── Quick Action bar ─────────────────────────────────────────────────────────
function QuickActions({ onAction, accent }) {
  const actions = [
    { id: 'photo', label: 'Photo', icon: Icon.camera },
    { id: 'templates', label: 'Templates', icon: Icon.list },
    { id: 'stats', label: "Today's Stats", icon: Icon.chart },
  ];
  return (
    <div style={{ display: 'flex', gap: 8, padding: '6px 12px 4px', overflowX: 'auto', scrollbarWidth: 'none' }}>
      {actions.map(a => (
        <button key={a.id} onClick={() => onAction(a.id)} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '7px 12px', borderRadius: 20, border: `1px solid ${G.border}`, background: G.surface, color: G.text, fontSize: 12, fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap', fontFamily: 'inherit', flexShrink: 0 }}>
          <span style={{ color: accent }}>{a.icon}</span>{a.label}
        </button>
      ))}
    </div>
  );
}

// ─── Input bar ────────────────────────────────────────────────────────────────
function InputBar({ onSend, accent, disabled }) {
  const [val, setVal] = React.useState('');
  const send = () => { if (!val.trim() || disabled) return; onSend(val.trim()); setVal(''); };
  return (
    <div style={{ padding: '8px 12px 12px', background: G.bg, borderTop: `1px solid ${G.border}` }}>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', background: G.surface, borderRadius: 24, border: `1px solid ${G.border}`, padding: '4px 4px 4px 14px', boxShadow: '0 1px 4px rgba(0,0,0,0.05)' }}>

// ─── CHAT SCREEN ─────────────────────────────────────────────────────────────
const SCENARIOS = {
  empty: [],
  summary: [
    { id: 1, role: 'ai', type: 'text', content: 'Good morning! I\'ve loaded today\'s log. You\'ve had breakfast and lunch so far — want to see a full summary?', time: '9:41 AM' },
    { id: 2, role: 'user', type: 'text', content: 'Yes, show me today\'s stats', time: '9:42 AM' },
    { id: 3, role: 'ai', type: 'text', content: 'Here\'s where you stand right now:', time: '9:42 AM' },
    { id: 4, role: 'ai', type: 'summary-card', time: '9:42 AM' },
    { id: 5, role: 'ai', type: 'text', content: 'You\'ve logged 1,340 kcal — 860 remaining. Protein is running a bit low.', time: '9:42 AM' },
  ],
  meals: [
    { id: 1, role: 'user', type: 'text', content: 'What did I eat today?', time: '1:14 PM' },
    { id: 2, role: 'ai', type: 'text', content: 'Here\'s your full log for today:', time: '1:14 PM' },
    { id: 3, role: 'ai', type: 'meal-list-card', time: '1:14 PM' },
    { id: 4, role: 'ai', type: 'text', content: '1,340 kcal logged. Dinner is your biggest opportunity — 860 kcal remaining.', time: '1:14 PM' },
  ],
  logging: [
    { id: 1, role: 'user', type: 'text', content: 'I had a chicken rice bowl for lunch', time: '12:33 PM' },
    { id: 2, role: 'ai', type: 'text', content: 'Got it — chicken rice bowl for lunch. Here\'s my estimate based on a standard serving:', time: '12:33 PM' },
    { id: 3, role: 'ai', type: 'confirm-card', time: '12:33 PM' },
  ],
};

function ChatScreen({ onSettings, accent, scenario = 'summary' }) {
  const bottomRef = React.useRef(null);
  const [messages, setMessages] = React.useState(SCENARIOS[scenario] || []);
  const [typing, setTyping] = React.useState(false);
  const [confirmedId, setConfirmedId] = React.useState(null);

  React.useEffect(() => {
    setMessages(SCENARIOS[scenario] || []);
  }, [scenario]);

  React.useEffect(() => {
    if (bottomRef.current) {
      const el = bottomRef.current.parentElement;
      if (el) el.scrollTop = el.scrollHeight;
    }
  }, [messages, typing]);

  const addAIMessage = (msgs, delay = 900) => {
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      msgs.forEach((m, i) => setTimeout(() => setMessages(prev => [...prev, { ...m, id: Date.now() + i }]), i * 200));
    }, delay);
  };

  const handleSend = (text) => {
    const userMsg = { id: Date.now(), role: 'user', type: 'text', content: text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
    setMessages(prev => [...prev, userMsg]);
    const t = text.toLowerCase();
    if (t.includes('stat') || t.includes('summar') || t.includes('today')) {
      addAIMessage([
        { role: 'ai', type: 'text', content: 'Here\'s your nutrition summary for today:' },
        { role: 'ai', type: 'summary-card' },
        { role: 'ai', type: 'text', content: 'You\'ve logged 1,340 kcal — 860 remaining.' },
      ]);
    } else if (t.includes('eat') || t.includes('log') || t.includes('meal')) {
      addAIMessage([
        { role: 'ai', type: 'text', content: 'Here\'s everything you\'ve logged today:' },
        { role: 'ai', type: 'meal-list-card' },
      ]);
    } else {
      addAIMessage([{ role: 'ai', type: 'text', content: 'Got it! I\'ll help with that. Try asking me to log a meal, show your stats, or list your templates.' }]);
    }
  };

  const handleAction = (id) => {
    if (id === 'stats') handleSend('Show today\'s stats');
    else if (id === 'templates') addAIMessage([{ role: 'ai', type: 'text', content: 'You have 4 saved templates:\n\n• Morning Oats (430 kcal)\n• Chicken Rice Bowl (652 kcal)\n• Protein Smoothie (310 kcal)\n• Greek Salad (280 kcal)\n\nSay "log [name]" to use one.' }]);
    else if (id === 'photo') addAIMessage([{ role: 'ai', type: 'text', content: 'Camera logging isn\'t available in this prototype, but in the live app you can snap a photo and I\'ll estimate the meal for you.' }]);
  };

  const handleConfirm = () => {
    setMessages(prev => prev.map(m => m.type === 'confirm-card' ? { ...m, type: 'text', content: '✅ Confirmed — logged as Lunch.', role: 'ai' } : m));
    addAIMessage([{ role: 'ai', type: 'text', content: 'Saved! You\'ve now logged 1,340 kcal — 860 remaining today.' }], 400);
  };

  const handleDeny = () => {
    setMessages(prev => prev.filter(m => m.type !== 'confirm-card'));
    addAIMessage([{ role: 'ai', type: 'text', content: 'No problem — what would you like to change?' }], 400);
  };

  const clearChat = () => setMessages([]);

  return (
    <div style={{ height: '100%', background: G.bg, display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ background: G.surface, borderBottom: `1px solid ${G.border}`, padding: '52px 16px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 36, height: 36, borderRadius: '50%', background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>🥗</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 600, color: G.text }}>Nutrition Assistant</div>
            <div style={{ fontSize: 11, color: G.green, fontWeight: 500 }}>● Online</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 4 }}>
          <button onClick={clearChat} title="Clear chat" style={{ width: 36, height: 36, borderRadius: '50%', border: `1px solid ${G.border}`, background: 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: G.textMid }}>
            {Icon.trash}
          </button>
          <button onClick={onSettings} style={{ width: 36, height: 36, borderRadius: '50%', border: `1px solid ${G.border}`, background: 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: G.textMid }}>
            {Icon.settings}
          </button>
        </div>
      </div>
      {/* Messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 12px', scrollbarWidth: 'none' }}>
        {messages.length === 0 && (
          <div style={{ textAlign: 'center', marginTop: 60, animation: 'fadeIn 0.5s ease' }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🥗</div>
            <div style={{ fontSize: 17, fontWeight: 600, color: G.text, marginBottom: 6 }}>Ready to track!</div>
            <div style={{ fontSize: 14, color: G.textMid, lineHeight: 1.6, padding: '0 20px' }}>Tell me what you ate, ask for your daily stats, or load a meal template.</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 24, padding: '0 8px' }}>
              {['"I had scrambled eggs for breakfast"', '"Show today\'s stats"', '"Log my morning oats template"'].map(s => (
                <button key={s} onClick={() => handleSend(s.replace(/"/g, ''))} style={{ padding: '10px 14px', borderRadius: 12, border: `1px solid ${G.border}`, background: G.surface, fontSize: 13, color: G.textMid, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left' }}>{s}</button>
              ))}
            </div>
          </div>
        )}
        {messages.map(msg => (
          <Message key={msg.id} msg={msg} accent={accent} onConfirm={handleConfirm} onDeny={handleDeny}/>
        ))}
        {typing && (
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, marginBottom: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>🥗</div>
            <TypingIndicator/>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {/* Quick actions */}
      <QuickActions onAction={handleAction} accent={accent}/>
      {/* Input */}
      <InputBar onSend={handleSend} accent={accent} disabled={typing}/>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const accent = tweaks.accentColor;

  // Screen states
  const SCREENS = {
    login: { label: 'Login', scenario: null },
    loginRestricted: { label: 'Login (Restricted)', scenario: null },
    chatEmpty: { label: 'Chat — Empty', scenario: 'empty' },
    chatSummary: { label: 'Chat — Daily Summary', scenario: 'summary' },
    chatMeals: { label: 'Chat — Meal Log', scenario: 'meals' },
    chatLogging: { label: 'Chat — Logging Confirm', scenario: 'logging' },
    settings: { label: 'Settings', scenario: null },
  };

  // Individual device states
  const [deviceScreens, setDeviceScreens] = React.useState({
    d1: 'login',
    d2: 'chatEmpty',
    d3: 'chatSummary',
    d4: 'chatMeals',
    d5: 'settings',
  });

  // Tweaks panel
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const applyTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const renderScreen = (screenId, deviceId) => {
    const s = SCREENS[screenId];
    if (!s) return null;
    if (screenId === 'login') return <LoginScreen accent={accent} onLogin={() => setDeviceScreens(prev => ({ ...prev, [deviceId]: 'chatEmpty' }))}/>;
    if (screenId === 'loginRestricted') return <LoginScreen accent={accent} restricted onLogin={() => {}}/>;
    if (screenId === 'settings') return <SettingsScreen accent={accent} onBack={() => setDeviceScreens(prev => ({ ...prev, [deviceId]: 'chatSummary' }))}/>;
    return <ChatScreen accent={accent} scenario={s.scenario} onSettings={() => setDeviceScreens(prev => ({ ...prev, [deviceId]: 'settings' }))}/>;
  };

  const DeviceColumn = ({ id, label }) => (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
      <div style={{ color: 'oklch(0.7 0.01 250)', fontSize: 12, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{label}</div>
      {tweaks.screenMode === 'all' && (
        <select value={deviceScreens[id]} onChange={e => setDeviceScreens(prev => ({ ...prev, [id]: e.target.value }))}
          style={{ background: 'oklch(0.22 0.02 250)', color: 'white', border: '1px solid oklch(0.3 0.02 250)', borderRadius: 8, padding: '4px 8px', fontSize: 11, fontFamily: 'inherit', cursor: 'pointer', marginBottom: 4 }}>
          {Object.entries(SCREENS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
      )}
      <IOSDevice width={390} height={844} dark={false}>
        {renderScreen(deviceScreens[id], id)}
      </IOSDevice>
    </div>
  );

  // Label overrides based on mode
  const labels = {
    d1: tweaks.screenMode === 'all' ? '01 Login' : '01 Login',
    d2: tweaks.screenMode === 'all' ? '02 Chat' : '02 Chat — Empty',
    d3: tweaks.screenMode === 'all' ? '03 Chat' : '03 Chat — Stats Card',
    d4: tweaks.screenMode === 'all' ? '04 Chat' : '04 Chat — Meal Log',
    d5: tweaks.screenMode === 'all' ? '05 Settings' : '05 Settings',
  };

  return (
    <>
      {Object.entries({ d1: labels.d1, d2: labels.d2, d3: labels.d3, d4: labels.d4, d5: labels.d5 }).map(([id, label]) => (
        <DeviceColumn key={id} id={id} label={label}/>
      ))}

      {/* Tweaks panel */}
      <div id="tweaks-panel">
        <h3>Tweaks</h3>
        <label>Accent color</label>
        <input type="color" value={tweaks.accentColor} onChange={e => applyTweak('accentColor', e.target.value)}/>
        <label>Screen switcher</label>
        <select value={tweaks.screenMode} onChange={e => applyTweak('screenMode', e.target.value)}>
          <option value="all">Show per-screen selectors</option>
          <option value="fixed">Fixed screens (default)</option>
        </select>
        <label>Chat scenario (devices 2–4)</label>
        <select value={tweaks.chatScenario || 'summary'} onChange={e => {
          applyTweak('chatScenario', e.target.value);
          const map = { empty: 'chatEmpty', summary: 'chatSummary', meals: 'chatMeals', logging: 'chatLogging' };
          setDeviceScreens(prev => ({ ...prev, d3: map[e.target.value] || 'chatSummary' }));
        }}>
          <option value="empty">Empty state</option>
          <option value="summary">Daily Summary card</option>
          <option value="meals">Meal log card</option>
          <option value="logging">Confirm logging</option>
        </select>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
